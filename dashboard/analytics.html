 <!DOCTYPE html>
<html>
<head>
  <title>Cyber Lab Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
    }
    canvas {
      margin: 20px;
    }
  </style>
</head>

<body>

<h2>Cyber Lab Analytics Dashboard</h2>

<h3 id="alertCount">⚠ Alerts: 0</h3>

<canvas id="chart" width="400" height="200"></canvas>
<canvas id="pieChart" width="400" height="200"></canvas>

<script>
let barChart, pieChart;

async function loadChart(){
  let res = await fetch("http://127.0.0.1:5000/logs");
  let data = await res.json();

  let count = {};
  let alerts = 0;

  data.forEach(log => {
    let app = log.window || "Unknown";
    count[app] = (count[app] || 0) + 1;

    if(log.alert && log.alert !== ""){
      alerts++;
    }
  });

  let labels = Object.keys(count);
  let values = Object.values(count);

  document.getElementById("alertCount").innerText = "⚠ Alerts: " + alerts;

  // Destroy old charts before re-render (important)
  if(barChart){
    barChart.destroy();
  }
  if(pieChart){
    pieChart.destroy();
  }

  // BAR CHART
  barChart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "App Usage",
        data: values
      }]
    }
  });

  // PIE CHART
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{
        data: values
      }]
    }
  });
}

// Auto refresh every 3 sec
setInterval(loadChart, 3000);

// First load
loadChart();
</script>

</body>
</html>
